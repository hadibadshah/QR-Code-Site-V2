    <script>
      // Suppress cross-origin script errors and ad blocker network errors
      window.onerror = function(message, source, lineno, colno, error) {
        if (
          message === 'Script error.' || 
          !source || 
          source.indexOf('effectivecpmnetwork.com') !== -1 || 
          source.indexOf('highperformanceformat.com') !== -1
        ) {
          console.warn('Suppressed third-party script/ad error:', message, 'from', source);
          return true; // Suppress reporting
        }
        return false;
      };

      window.addEventListener('error', function(event) {
        if (
          event.message === 'Script error.' ||
          (event.filename && (
            event.filename.indexOf('effectivecpmnetwork.com') !== -1 || 
            event.filename.indexOf('highperformanceformat.com') !== -1
          ))
        ) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);

      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      // in environments (like sandboxed iframes) where window.fetch is read-only on the prototype.
      try {
        let currentFetch = window.fetch;
        
        function patchFetch(obj) {
          if (!obj) return;
          try {
            Object.defineProperty(obj, 'fetch', {
              configurable: true,
              enumerable: true,
              get() {
                return currentFetch;
              },
              set(val) {
                currentFetch = val;
              }
            });
          } catch (e) {
            console.warn("Failed to patch fetch on:", obj, e);
          }
        }

        patchFetch(window);
        patchFetch(globalThis);
        patchFetch(self);
      } catch (e) {
        console.error("Critical error in fetch patch:", e);
      }
    </script>
